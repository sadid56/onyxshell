$mainMod = SUPER
$secondMod = ALT


# App Launchers
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, RETURN, exec, pypr toggle term
bind = $mainMod, E, exec, $fileManager
bind = $secondMod, SPACE, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, L, exec, hyprlock

bind = $mainMod SHIFT , B, exec, ~/.config/hypr/scripts/toggle_waybar.sh

# Show keybinds cheat sheet
bind = $mainMod, slash, exec, ~/.config/hypr/scripts/keybinds.sh

# Clipboard & Notifications

bind = $mainMod, V, exec, rofi -modi "clipboard:~/.config/hypr/scripts/cliphist.sh" -show clipboard -show-icons -theme ~/.config/hypr/styles/clipboard.rasi
bind = $mainMod SHIFT, V, exec, cliphist wipe && notify-send "Clipboard cleared"
bind = $mainMod, N, exec, swaync-client -t -sw


#########################
### WINDOW MANAGEMENT ###
#########################

# Basic Window Actions
bind = $mainMod, X, killactive,
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, A, exec, qs ipc -c overview call overview toggle


# Cycle & Move Focus
bind = $mainMod, F, fullscreen, 1
bind = $secondMod, Tab, changegroupactive, f
bind = $mainMod, G, togglegroup
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mouse Window Resize/Move
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##################
### WORKSPACES ###
##################
bind = $mainMod, tab, workspace, previous
# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move Windows to Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special Workspace (Scratchpad)
bind = $secondMod, S, togglespecialworkspace, magic
bind = $secondMod SHIFT, S, movetoworkspace, special:magic
bind = $secondMod SHIFT, Y, movetoworkspace, +0

# Scroll Workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


#resize window
binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50


#move window
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d
#######################
### SYSTEM & MEDIA  ###
#######################
bind = $mainMod, R, exec, kitty --class floating_mem -e watch --color -t -n 1 ~/.config/hypr/scripts/sysmon.sh
# System Controls
bind = $mainMod, M, exec, wlogout
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper_switch.sh
bind = $mainMod SHIFT, E, exec, ~/.config/hypr/scripts/shutdown.sh
# Screenshots
bind = $mainMod, PRINT, exec, hyprshot -m window -o ~/Pictures/Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m output -o ~/Pictures/Screenshots


# Volume & Brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media Controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


