# Animations
animations {
    enabled = yes

    # Snappy modern curve (fast start, smooth end)
    bezier = smoothOut, 0.25, 0.9, 0.35, 1.0
    bezier = smoothIn, 0.15, 0.7, 0.3, 1.0

    # Windows → fast & responsive
    animation = windows, 1, 4, smoothOut
    animation = windowsOut, 1, 4, smoothIn, popin 92%

    # Borders → subtle but responsive
    animation = border, 1, 8, default
    animation = borderangle, 1, 6, default

    # Fade → quicker (important for UI feel)
    animation = fade, 1, 3, default

    # Workspaces → smooth but not laggy
    animation = workspaces, 1, 5, smoothOut
}
